<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#141414;
    color:white;
}

header{
    background:#000;
    color:#E50914;
    padding:20px 40px;
    font-size:32px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h2{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    color:#ccc;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin:40px;
}

.card{
    background:#222;
    width:260px;
    padding:25px;
    border-radius:10px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card h3{
    margin-bottom:20px;
}

button{
    background:#E50914;
    color:white;
    border:none;
    padding:12px 25px;
    cursor:pointer;
    border-radius:5px;
    font-size:16px;
}

button:hover{
    background:#b20710;
}

.player{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

video{
    width:100%;
    border-radius:10px;
    background:black;
}
</style>

</head>
<body>

<header>
NETFLIX
</header>

<section class="hero">
<h2>Welcome</h2>
<p>Select a movie and start watching.</p>
</section>

<div class="container">

<div class="card">
<h3>Demo Video 1</h3>

<button onclick="playMovie(
'https://demo-ayan-bucket.s3.ap-southeast-2.amazonaws.com/videos/demo1.mp4',
'Demo Video 1'
)">
▶ Watch
</button>

</div>

<div class="card">
<h3>Demo Video 2</h3>

<button onclick="playMovie(
'https://demo-ayan-bucket.s3.ap-southeast-2.amazonaws.com/videos/demo2.mp4',
'Demo Video 2'
)">
▶ Watch
</button>

</div>

</div>

<div class="player">

<h2 id="movieTitle">Now Playing</h2>

<video id="videoPlayer" controls>
Your browser does not support HTML5 video.
</video>

</div>

<script>

function playMovie(url,title){

document.getElementById("movieTitle").innerHTML=title;

const player=document.getElementById("videoPlayer");

player.src=url;

player.load();

player.play();

window.scrollTo({
top:document.getElementById("videoPlayer").offsetTop,
behavior:"smooth"
});

}

</script>

</body>
</html>
